spring:
  application:
    name: paranoia-engine

  datasource:
    url: jdbc:postgresql://localhost:5432/paranoia_engine
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.groq.com/openai/v1
      chat:
        model: llama-3.3-70b-versatile
        options:
          temperature: 0.2

server:
  port: 8080

toxiproxy:
  url: ${TOXIPROXY_URL:localhost:8474}
  proxy-name: ${TOXIPROXY_PROXY:postgres}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
