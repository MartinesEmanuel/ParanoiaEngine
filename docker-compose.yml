services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paranoia_engine
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.8.0
    ports:
      - "8474:8474"
      - "5433:5433"
      - "5435:5435"
    depends_on:
      postgres:
        condition: service_healthy
      finance-control-db:
        condition: service_healthy

  toxiproxy-init:
    image: curlimages/curl:8.6.0
    depends_on:
      toxiproxy:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "--- Criando proxy postgres ---"
        curl -s -X POST http://toxiproxy:8474/proxies \
          -H "Content-Type: application/json" \
          -d '{"name":"postgres","listen":"0.0.0.0:5433","upstream":"postgres:5432","enabled":true}' || true
        echo "--- Criando proxy finance-db ---"
        curl -s -X POST http://toxiproxy:8474/proxies \
          -H "Content-Type: application/json" \
          -d '{"name":"finance-db","listen":"0.0.0.0:5435","upstream":"finance-control-db:5432","enabled":true}' || true
        echo "--- Proxies configurados ---"

  finance-control-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: emanuel
      POSTGRES_PASSWORD: controller
      POSTGRES_DB: finance_control
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emanuel"]
      interval: 5s
      timeout: 5s
      retries: 5
